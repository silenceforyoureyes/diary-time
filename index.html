<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FCFAF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="日记本">
  <meta name="description" content="一个简单优雅的日记应用">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23FCFAF6'/><text y='72' x='50' text-anchor='middle' font-size='52'>📔</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <title>日记本</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
      --white: #FFFFFF;
      --black: #181411;
      --gray: #FCFAF6;
      --second: #F3F0EB;
      --primary: #D97706;
      --primary-hover: #B45309;
      --primary-light: #FFF7ED;
      --hover: #EBE6DF;
      --active: #E6E1DA;
      --border: #E7E3DB;
      --border-light: #F0ECE5;
      --text-secondary: #6B6258;
      --text-tertiary: #9C9389;
      --text-placeholder: #B8B0A5;
      --danger: #DC2626;
      --danger-bg: #FEF2F2;
      --danger-border: #FECACA;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --sidebar-width: 260px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      font-weight: 400;
      background: var(--gray);
      color: var(--black);
      display: flex;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--second);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 62px;
      min-width: 62px;
    }

    .sidebar-top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px 6px;
    }

    .btn-collapse {
      width: 32px; height: 32px; border: none; background: transparent;
      border-radius: var(--radius-sm); cursor: pointer; color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }

    .btn-collapse:hover { background: var(--hover); color: var(--black); }
    .btn-collapse svg { width: 18px; height: 18px; }

    .sidebar.collapsed .btn-collapse { margin: 0 auto; }

    .sidebar.collapsed .btn-new-chat {
      justify-content: center; padding: 10px; margin: 2px 8px 6px;
    }
    .sidebar.collapsed .btn-new-chat span { display: none; }
    .sidebar.collapsed .btn-new-chat svg { margin: 0; }

    .sidebar.collapsed .search-wrap { display: none; }

    .sidebar.collapsed .diary-group-title { display: none; }
    .sidebar.collapsed .diary-item-preview { display: none; }
    .sidebar.collapsed .diary-item-title { font-size: 12px; text-align: center; }
    .sidebar.collapsed .diary-item {
      justify-content: center; padding: 8px 4px;
    }
    .sidebar.collapsed .diary-item-delete { display: none; }

    .sidebar.collapsed .sidebar-footer { justify-content: center; }

    .sidebar-brand {
      padding: 18px 16px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-new-chat {
      margin: 4px 12px 8px; padding: 9px 14px;
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit; color: var(--black);
      display: flex; align-items: center; gap: 8px;
      transition: all var(--transition);
    }

    .btn-new-chat:hover { background: var(--hover); border-color: #D0D0C8; }

    .btn-new-chat svg { width: 16px; height: 16px; color: var(--text-tertiary); flex-shrink: 0; }

    .search-wrap { padding: 6px 12px; margin-bottom: 2px; }

    .search-input {
      width: 100%; padding: 8px 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; font-family: inherit; background: var(--white);
      color: var(--black); outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-input::placeholder { color: var(--text-placeholder); }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .diary-list {
      flex: 1; overflow-y: auto; padding: 4px 8px; scroll-behavior: smooth;
    }

    .diary-list::-webkit-scrollbar { width: 4px; }
    .diary-list::-webkit-scrollbar-thumb { background: #D5D3CE; border-radius: 12px; }

    .diary-group-title {
      font-size: 11px; font-weight: 600; color: var(--text-tertiary);
      padding: 14px 12px 6px; letter-spacing: 0.2px;
    }

    .diary-group:first-child .diary-group-title { padding-top: 6px; }

    .diary-item {
      position: relative; padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background var(--transition); margin-bottom: 1px;
      display: flex; align-items: flex-start; justify-content: space-between;
    }

    .diary-item:hover { background: var(--hover); }
    .diary-item.active { background: var(--active); }

    .diary-item-main { flex: 1; min-width: 0; }

    .diary-item-title {
      font-size: 13px; font-weight: 500; color: var(--black);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
    }

    .diary-item-preview {
      font-size: 12px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
    }

    .diary-item-delete {
      opacity: 0; width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: 4px; color: var(--text-tertiary);
      transition: opacity var(--transition), color var(--transition);
      margin-top: 2px; margin-left: 4px;
    }

    .diary-item:hover .diary-item-delete { opacity: 0.5; }
    .diary-item-delete:hover { opacity: 1 !important; color: var(--danger); }

    .diary-item-delete svg { width: 14px; height: 14px; }

    .diary-item-pin {
      opacity: 0; width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: 4px; color: var(--text-tertiary);
      transition: opacity var(--transition), color var(--transition);
      margin-top: 2px; margin-left: 2px;
    }

    .diary-item:hover .diary-item-pin { opacity: 0.5; }
    .diary-item-pin:hover { opacity: 1 !important; color: var(--primary); }

    .diary-item-pin svg { width: 14px; height: 14px; }

    .diary-group-pinned {
      padding-bottom: 6px;
      margin-bottom: 2px;
      border-bottom: 1px solid var(--border);
    }

    .diary-list-empty {
      font-size: 13px; color: var(--text-tertiary);
      text-align: center; padding: 40px 16px; line-height: 1.6;
    }

    .sidebar-footer {
      padding: 10px 12px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end;
    }

    .btn-settings {
      width: 32px; height: 32px; border: none; background: transparent;
      border-radius: var(--radius-sm); cursor: pointer; color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition), background var(--transition);
    }

    .btn-settings:hover { background: var(--hover); color: var(--black); }
    .btn-settings svg { width: 18px; height: 18px; }

    /* ===== HAMBURGER ===== */
    .hamburger {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 20;
      width: 36px; height: 36px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: var(--white);
      cursor: pointer; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
    }

    .hamburger svg { width: 18px; height: 18px; color: var(--black); }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.3); z-index: 9;
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }

    .overlay.open { display: block; }

    /* ===== MAIN ===== */
    .main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; background: var(--gray);
    }

    .main-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px; text-align: center;
    }

    .main-empty-greeting {
      font-size: 22px; font-weight: 600; color: var(--text-secondary);
      letter-spacing: -0.3px; margin-bottom: 4px;
    }

    /* ===== BUBBLE VIEW ===== */
    .main-content {
      flex: 1; overflow-y: auto; padding: 0 32px; scroll-behavior: smooth;
    }

    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-thumb { background: #D5D3CE; border-radius: 12px; }

    .diary-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px; position: sticky; top: 0;
      background: var(--gray); z-index: 2;
      border-bottom: 1px solid var(--border-light); margin-bottom: 24px;
    }

    .diary-date {
      font-size: 15px; font-weight: 600; color: var(--text-secondary);
      display: flex; align-items: center; gap: 8px;
    }

    .diary-date svg { width: 16px; height: 16px; color: var(--text-tertiary); }

    .btn-edit-diary {
      padding: 6px 12px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
      color: var(--text-secondary); display: flex; align-items: center; gap: 6px;
      transition: all var(--transition);
    }

    .btn-edit-diary:hover { background: var(--hover); border-color: #D0D0C8; color: var(--black); }
    .btn-edit-diary svg { width: 13px; height: 13px; }

    /* ===== BUBBLES ===== */
    .bubbles {
      max-width: 680px; padding-bottom: 40px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .bubble-wrapper {
      display: flex; flex-direction: column;
      align-items: flex-end;
      padding: 4px 0;
    }

    .bubble {
      position: relative;
      max-width: 78%;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg);
      padding: 14px 18px;
      font-size: 15px; line-height: 1.75;
      color: var(--black); word-wrap: break-word;
      box-shadow: var(--shadow-sm);
    }

    .bubble h1 { font-size: 1.5em; font-weight: 700; margin: 1em 0 0.3em; letter-spacing: -0.3px; }
    .bubble h1:first-child { margin-top: 0; }
    .bubble h2 { font-size: 1.3em; font-weight: 700; margin: 1em 0 0.3em; }
    .bubble h2:first-child { margin-top: 0; }
    .bubble h3 { font-size: 1.1em; font-weight: 600; margin: 0.8em 0 0.3em; }
    .bubble h3:first-child { margin-top: 0; }
    .bubble p { margin: 0.4em 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 0.4em 0; padding-left: 1.5em; }
    .bubble li { margin: 0.15em 0; }
    .bubble blockquote {
      border-left: 3px solid var(--primary); padding: 4px 16px;
      margin: 0.6em 0; color: var(--text-secondary);
      background: var(--primary-light); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .bubble code {
      font-family: var(--font-mono); background: var(--second);
      padding: 2px 6px; border-radius: 4px; font-size: 0.88em; color: #B45309;
    }
    .bubble pre {
      background: #1E1E1E; color: #E5E5E5;
      padding: 16px; border-radius: var(--radius); overflow-x: auto;
      margin: 0.6em 0; line-height: 1.5;
    }
    .bubble pre code { background: none; color: inherit; padding: 0; font-size: 0.85em; }
    .bubble a { color: var(--primary); text-decoration: underline; text-underline-offset: 2px; }
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
    .bubble img { max-width: 100%; border-radius: var(--radius-sm); }

    .bubble-time {
      font-size: 11px; color: var(--text-tertiary); margin-top: 8px;
    }

    .bubble-actions {
      display: flex; gap: 2px; margin-top: 4px;
      justify-content: flex-end; opacity: 0.35;
      transition: opacity var(--transition);
    }

    .bubble-wrapper:hover .bubble-actions { opacity: 1; }

    .bubble-action {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; background: transparent; border: none;
      border-radius: 6px; cursor: pointer;
      color: var(--text-secondary);
      transition: all var(--transition);
    }

    .bubble-action:hover { background: var(--hover); color: var(--black); }
    .bubble-action svg { width: 14px; height: 14px; }

    .bubble-action.delete:hover { color: var(--danger); background: var(--danger-bg); }
    .bubble-action.copied { color: #059669; opacity: 1; }

    .empty-bubbles {
      text-align: center; padding: 40px 20px;
      color: var(--text-tertiary); font-size: 14px; font-style: italic;
    }

    /* ===== EDITOR ===== */
    .editor {
      max-width: 680px; padding-bottom: 40px;
    }

    .editor textarea {
      width: 100%; font-size: 15px; line-height: 1.75; font-family: var(--font);
      color: var(--black); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; resize: vertical;
      outline: none; min-height: 320px; background: var(--white);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .editor textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .editor-actions {
      display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
    }

    .btn-cancel {
      padding: 8px 16px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; cursor: pointer; font-family: inherit;
      color: var(--text-secondary); transition: all var(--transition);
    }

    .btn-cancel:hover { background: var(--hover); color: var(--black); }

    .btn-save {
      padding: 8px 16px; background: var(--black); border: none;
      border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
      font-family: inherit; color: #FFF; font-weight: 500;
      transition: background var(--transition);
    }

    .btn-save:hover { background: #3D3D3D; }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 0 32px 24px; flex-shrink: 0;
    }

    .input-area-inner { max-width: 680px; margin: 0 auto; }

    .input-wrap {
      display: flex; align-items: flex-end; background: var(--white);
      border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 8px 10px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-wrap:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .btn-attach {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: var(--radius); color: var(--text-tertiary); flex-shrink: 0;
      transition: color var(--transition), background var(--transition);
    }

    .btn-attach:hover { color: var(--black); background: var(--hover); }
    .btn-attach svg { width: 18px; height: 18px; }

    .diary-input {
      flex: 1; border: none; outline: none; font-size: 15px;
      font-family: inherit; color: var(--black); background: transparent;
      resize: none; min-height: 22px; max-height: 180px;
      padding: 5px 4px; line-height: 1.6;
    }

    .diary-input::placeholder { color: var(--text-placeholder); }

    .btn-send {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: var(--radius); color: var(--text-tertiary); flex-shrink: 0;
      transition: all var(--transition);
    }

    .btn-send:hover { background: var(--hover); color: var(--black); }
    .btn-send.has-content { color: var(--primary); }
    .btn-send.has-content:hover { background: var(--primary-light); }
    .btn-send svg { width: 20px; height: 20px; }

    .input-hint {
      text-align: center; font-size: 11px;
      color: var(--text-tertiary); margin-top: 10px;
    }

    .attach-preview {
      display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0 0;
    }

    .attach-thumb {
      position: relative; width: 64px; height: 64px;
      border-radius: var(--radius-sm); overflow: hidden;
      border: 1px solid var(--border);
    }

    .attach-thumb img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .attach-thumb-remove {
      position: absolute; top: 2px; right: 2px;
      width: 18px; height: 18px; border: none;
      background: rgba(0,0,0,0.5); color: #FFF; cursor: pointer;
      border-radius: 50%; font-size: 11px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity var(--transition);
    }

    .attach-thumb:hover .attach-thumb-remove { opacity: 1; }

    /* ===== MODAL ===== */
    .modal-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-mask.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg); width: 90vw; max-width: 420px;
      overflow: hidden; transform: translateY(8px);
      transition: transform 0.2s ease;
    }

    .modal-mask.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 20px 24px 14px; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; justify-content: space-between;
    }

    .modal-title { font-size: 16px; font-weight: 600; }

    .modal-close {
      width: 28px; height: 28px; border: none; background: transparent;
      border-radius: var(--radius-sm); cursor: pointer; color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }

    .modal-close:hover { background: var(--hover); color: var(--black); }
    .modal-close svg { width: 16px; height: 16px; }

    .modal-body { padding: 16px 24px; }

    .modal-action {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 12px 16px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; font-size: 14px; font-family: inherit; color: var(--black);
      transition: all var(--transition); margin-bottom: 8px;
    }

    .modal-action:hover { background: var(--hover); border-color: #D0D0C8; }
    .modal-action svg { width: 18px; height: 18px; color: var(--text-secondary); flex-shrink: 0; }

    .modal-action-text { text-align: left; }
    .modal-action-title { font-weight: 500; }
    .modal-action-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .modal-about {
      padding: 16px; background: var(--gray); border-radius: var(--radius-sm);
      font-size: 13px; color: var(--text-secondary); line-height: 1.7;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--black); color: #FFF; padding: 10px 20px;
      border-radius: var(--radius); font-size: 13px; font-family: inherit;
      opacity: 0; transition: all 0.3s ease;
      pointer-events: none; z-index: 200; white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== RESPONSIVE (Mobile < 768px) ===== */
    @media (max-width: 768px) {
      body { padding: 0; }
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0; height: auto;
        width: 280px; max-width: 85vw;
        transform: translateX(-100%); box-shadow: var(--shadow-md);
        z-index: 110;
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
      }

      .sidebar.open { transform: translateX(0); }
      .hamburger { display: flex; top: calc(12px + var(--safe-top)); }
      .btn-collapse { display: none; }

      .main-content {
        padding: 0 16px;
        padding-top: calc(12px + var(--safe-top));
      }

      .diary-header {
        display: none;
      }

      .bubble-wrapper {
        padding: 0 0 10px;
      }

      .bubble {
        border-radius: var(--radius-sm);
        padding: 14px 16px;
      }

      .bubble-content {
        font-size: 15px;
        line-height: 1.7;
      }

      .input-area {
        padding: 0 12px calc(12px + var(--safe-bottom));
      }

      .input-wrap {
        border-radius: var(--radius);
        padding: 6px;
      }

      .diary-input {
        min-height: 38px;
        font-size: 15px;
      }

      .btn-attach, .btn-send {
        width: 38px; height: 38px;
      }

      .btn-attach svg, .btn-send svg { width: 20px; height: 20px; }

      .input-hint { display: none; }

      .modal {
        width: 100vw;
        max-width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        display: flex;
        flex-direction: column;
      }

      .modal-header {
        padding-top: calc(20px + var(--safe-top));
      }

      .modal-body {
        flex: 1;
        overflow-y: auto;
      }

      .toast {
        bottom: calc(24px + var(--safe-bottom));
      }

      .diary-item {
        padding: 10px 12px;
      }

      .btn-new-chat {
        margin: 4px 12px 8px;
        padding: 10px 14px;
        font-size: 14px;
      }

      .overlay { z-index: 105; }

      .sidebar-footer {
        padding: 12px 16px;
      }

      .btn-settings {
        width: 40px; height: 40px;
      }

      .btn-settings svg { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>

  <button class="hamburger" id="hamburger" aria-label="菜单">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div class="overlay" id="overlay"></div>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top-bar">
      <button class="btn-collapse" id="btnCollapse" title="收起侧边栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
        </svg>
      </button>
    </div>
    <button class="btn-new-chat" id="btnNew">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>新日记</span>
    </button>

    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索日记...">
    </div>

    <div class="diary-list" id="diaryList"></div>

    <div class="sidebar-footer">
      <button class="btn-settings" id="btnSettings" aria-label="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main" id="main">
    <div class="main-empty" id="mainEmpty">
      <div class="main-empty-greeting">Coffee &amp; Diarytime?</div>
      
    </div>

    <div id="mainDiaryView" style="display:none;flex-direction:column;height:100%;">
      <div class="main-content" id="mainContent"></div>
      <div class="input-area" id="inputArea">
        <div class="input-area-inner">
          <div class="input-wrap">
            <button class="btn-attach" id="btnAttach" title="添加图片">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <textarea class="diary-input" id="diaryInput" placeholder="How do you feel today?" rows="1"></textarea>
            <button class="btn-send" id="btnSend" title="发送 (Ctrl+Enter)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
              </svg>
            </button>
          </div>
          <div class="attach-preview" id="attachPreview"></div>
          <div class="input-hint">Ctrl + Enter 发送 · 日记本 v1.0 · 数据仅保存在你的浏览器中</div>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== SETTINGS MODAL ===== -->
  <div class="modal-mask" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">设置</span>
        <button class="modal-close" id="modalClose">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <button class="modal-action" id="modalImport">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <div class="modal-action-text">
            <div class="modal-action-title">导入日记</div>
            <div class="modal-action-desc">从 JSON 备份文件恢复数据</div>
          </div>
        </button>

        <button class="modal-action" id="modalExport">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <div class="modal-action-text">
            <div class="modal-action-title">导出日记</div>
            <div class="modal-action-desc">下载所有日记为 JSON 备份文件</div>
          </div>
        </button>

        <div class="modal-about">
          <strong>日记本 v1.1</strong><br>
          所有数据仅保存在你的浏览器本地存储中。不会上传到任何服务器。<br>
          建议定期导出备份以防数据丢失。<br>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json" style="display:none;">
  <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"
          onerror="this.onerror=null;this.src='https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/marked/11.0.0/marked.min.js'"></script>
  <script>
    const STORAGE_KEY = 'diary_app_v3_bubbles';
    const DIARY_DATE_OPTS = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };

    const $sidebar = document.getElementById('sidebar');
    const $overlay = document.getElementById('overlay');
    const $hamburger = document.getElementById('hamburger');
    const $btnCollapse = document.getElementById('btnCollapse');
    const $diaryList = document.getElementById('diaryList');
    const $searchInput = document.getElementById('searchInput');
    const $mainEmpty = document.getElementById('mainEmpty');
    const $mainDiaryView = document.getElementById('mainDiaryView');
    const $mainContent = document.getElementById('mainContent');
    const $diaryInput = document.getElementById('diaryInput');
    const $btnSend = document.getElementById('btnSend');
    const $btnNew = document.getElementById('btnNew');
    const $btnSettings = document.getElementById('btnSettings');
    const $settingsModal = document.getElementById('settingsModal');
    const $modalClose = document.getElementById('modalClose');
    const $modalImport = document.getElementById('modalImport');
    const $modalExport = document.getElementById('modalExport');
    const $fileInput = document.getElementById('fileInput');
    const $btnAttach = document.getElementById('btnAttach');
    const $attachPreview = document.getElementById('attachPreview');
    const $imageInput = document.getElementById('imageInput');
    const $toast = document.getElementById('toast');

    let diaries = [];
    let currentId = null;
    let isEditMode = false;
    let attachedImages = [];

    // ===== DATA MODEL =====
    function normDiary(d) {
      if (!d.bubbles && d.content !== undefined) {
        const now = d.createdAt || d.updatedAt || new Date().toISOString();
        d.bubbles = d.content ? [{ id: 'b1', content: d.content, createdAt: now }] : [];
        delete d.content;
      }
      if (!d.bubbles) d.bubbles = [];
      if (d.pinned === undefined) d.pinned = false;
      return d;
    }

    function loadDiaries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        diaries = arr.map(normDiary);
        diaries.sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      } catch { diaries = []; }
    }

    function saveDiaries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(diaries));
    }

    function getDiary(id) { return diaries.find(d => d.id === id); }

    function renderMarkdown(text) {
      return (typeof marked !== 'undefined') ? marked.parse(text) : escapeHtml(text);
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 8);
    }

    // ===== FORMAT =====
    function formatDate(isoStr) {
      return new Date(isoStr).toLocaleDateString('zh-CN', DIARY_DATE_OPTS);
    }

    function formatTime(isoStr) {
      return new Date(isoStr).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function getBubblePreview(bubbles) {
      if (!bubbles || bubbles.length === 0) return '空日记';
      const text = bubbles[bubbles.length - 1].content.replace(/[#*`~>\[\]!\-\\]/g, '').replace(/\s+/g, ' ').trim();
      return text.substring(0, 50);
    }

    function getBubbleTitle(bubbles) {
      if (!bubbles || bubbles.length === 0) return '无标题';
      const lines = bubbles[0].content.trim().split('\n');
      const first = lines.find(l => l.trim());
      return first ? first.replace(/^#+\s*/, '').substring(0, 30) : '无标题';
    }

    function getDateGroup(isoStr) {
      const d = new Date(isoStr);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      const weekStart = new Date(today); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const dd = new Date(d.getFullYear(), d.getMonth(), d.getDate());

      if (dd.getTime() >= today.getTime()) return 'today';
      if (dd.getTime() >= yesterday.getTime()) return 'yesterday';
      if (dd.getTime() >= weekStart.getTime()) return 'week';
      if (dd.getTime() >= monthStart.getTime()) return 'month';
      return 'older';
    }

    function getDateGroupLabel(group) {
      return { today: '今天', yesterday: '昨天', week: '本周', month: '本月', older: '更早' }[group] || '';
    }

    function getDisplayDate(isoStr) {
      const d = new Date(isoStr);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const dd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const diffDays = Math.floor((today - dd) / 86400000);
      if (diffDays === 0) return '今天';
      if (diffDays === 1) return '昨天';
      return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }

    // ===== SIDEBAR =====
    function renderSidebar() {
      const query = $searchInput.value.trim().toLowerCase();
      let filtered = diaries;
      if (query) {
        filtered = diaries.filter(d => {
          const allText = d.bubbles.map(b => b.content).join(' ').toLowerCase();
          return allText.includes(query);
        });
      }

      if (filtered.length === 0) {
        $diaryList.innerHTML = `
          <div class="diary-list-empty">
            ${query ? '没有找到匹配的日记' : '还没有日记<br>点击上方按钮开始写第一篇'}
          </div>`;
        return;
      }

      const pinned = filtered.filter(d => d.pinned);
      const unpinned = filtered.filter(d => !d.pinned);

      const groups = { today: [], yesterday: [], week: [], month: [], older: [] };
      for (const d of unpinned) {
        const g = getDateGroup(d.createdAt);
        if (groups[g]) groups[g].push(d);
      }

      let html = '';

      if (pinned.length > 0) {
        html += `<div class="diary-group diary-group-pinned">`;
        for (const d of pinned) {
          html += buildDiaryItemHTML(d);
        }
        html += `</div>`;
      }

      for (const [group, items] of Object.entries(groups)) {
        if (items.length === 0) continue;
        html += `<div class="diary-group"><div class="diary-group-title">${getDateGroupLabel(group)}</div>`;
        for (const d of items) {
          html += buildDiaryItemHTML(d);
        }
        html += `</div>`;
      }

      $diaryList.innerHTML = html;
    }

    function buildDiaryItemHTML(d) {
      const isActive = d.id === currentId;
      return `
        <div class="diary-item${isActive ? ' active' : ''}" data-id="${d.id}">
          <div class="diary-item-main">
            <div class="diary-item-title">${getBubbleTitle(d.bubbles)}</div>
            <div class="diary-item-preview">${getDisplayDate(d.createdAt)} · ${getBubblePreview(d.bubbles)}</div>
          </div>
          <button class="diary-item-pin${d.pinned ? ' pinned' : ''}" data-pin="${d.id}" title="${d.pinned ? '取消置顶' : '置顶'}">
            <svg viewBox="0 0 24 24" fill="${d.pinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
            </svg>
          </button>
          <button class="diary-item-delete" data-delete="${d.id}" title="删除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
          </button>
        </div>`;
    }

    // ===== BUBBLE VIEW =====
    function renderMain() {
      const diary = getDiary(currentId);
      if (!diary) {
        $mainEmpty.style.display = 'flex';
        $mainDiaryView.style.display = 'none';
        return;
      }

      $mainEmpty.style.display = 'none';
      $mainDiaryView.style.display = 'flex';

      if (isEditMode) {
        renderEditView(diary);
      } else {
        renderBubbleView(diary);
      }

      $diaryInput.value = '';
      autoResize($diaryInput);
      updateSendButton();
    }

    function renderBubbleView(diary) {
      let bubblesHtml = '';
      if (diary.bubbles.length === 0) {
        bubblesHtml = '';
      } else {
        bubblesHtml = diary.bubbles.map(b => `
          <div class="bubble-wrapper" data-bubble-id="${b.id}">
            <div class="bubble">
              <div class="bubble-content">${renderMarkdown(b.content)}</div>
              <div class="bubble-time">${formatTime(b.createdAt)}</div>
            </div>
            <div class="bubble-actions">
              <button class="bubble-action copy" data-bubble="${b.id}" title="Copy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
              <button class="bubble-action edit" data-bubble="${b.id}" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="bubble-action delete" data-bubble="${b.id}" title="Delete">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
              </button>
            </div>
          </div>
        `).join('');
      }

      $mainContent.innerHTML = `
        <div class="diary-header">
          <div class="diary-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>${formatDate(diary.createdAt)}${diary.updatedAt !== diary.createdAt ? ' (已编辑)' : ''}</span>
          </div>
          <button class="btn-edit-diary" id="btnEditDiary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            编辑
          </button>
        </div>
        <div class="bubbles" id="bubblesContainer">
          ${bubblesHtml}
        </div>
      `;

      $mainContent.scrollTop = $mainContent.scrollHeight;

      document.getElementById('btnEditDiary')?.addEventListener('click', () => {
        isEditMode = true;
        renderMain();
      });

      document.querySelectorAll('.bubble-action.copy').forEach(btn => {
        btn.addEventListener('click', () => copyBubble(diary, btn.dataset.bubble, btn));
      });

      document.querySelectorAll('.bubble-action.delete').forEach(btn => {
        btn.addEventListener('click', () => deleteBubble(diary, btn.dataset.bubble));
      });

      document.querySelectorAll('.bubble-action.edit').forEach(btn => {
        btn.addEventListener('click', () => editBubble(diary, btn.dataset.bubble));
      });
    }

    function renderEditView(diary) {
      const allContent = diary.bubbles.map(b => b.content).join('\n\n---\n\n');

      $mainContent.innerHTML = `
        <div class="diary-header">
          <div class="diary-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>编辑：${formatDate(diary.createdAt)}</span>
          </div>
          <div></div>
        </div>
        <div class="editor">
          <textarea id="editorTextarea">${escapeHtml(allContent)}</textarea>
          <div class="editor-actions">
            <button class="btn-cancel" id="btnCancelEdit">取消</button>
            <button class="btn-save" id="btnSaveEdit">保存</button>
          </div>
        </div>
      `;

      $mainContent.scrollTop = 0;

      document.getElementById('btnCancelEdit')?.addEventListener('click', () => {
        isEditMode = false;
        renderMain();
      });

      document.getElementById('btnSaveEdit')?.addEventListener('click', () => {
        const val = document.getElementById('editorTextarea')?.value ?? '';
        const parts = val.split(/\n\n---+\n\n/);
        diary.bubbles = parts.filter(p => p.trim()).map(p => ({
          id: generateId(),
          content: p.trim(),
          createdAt: new Date().toISOString(),
        }));
        if (diary.bubbles.length === 0) {
          diary.bubbles = [];
        }
        diary.updatedAt = new Date().toISOString();
        saveDiaries();
        isEditMode = false;
        renderSidebar();
        renderMain();
        showToast('日记已保存');
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function copyBubble(diary, bubbleId, btnEl) {
      const bubble = diary.bubbles.find(b => b.id === bubbleId);
      if (!bubble) return;

      navigator.clipboard.writeText(bubble.content).then(() => {
        if (btnEl) {
          btnEl.classList.add('copied');
          const origHtml = btnEl.innerHTML;
          btnEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
          setTimeout(() => {
            btnEl.classList.remove('copied');
            btnEl.innerHTML = origHtml;
          }, 1500);
        }
      }).catch(() => showToast('复制失败'));
    }

    function deleteBubble(diary, bubbleId) {
      if (diary.bubbles.length <= 1) {
        deleteDiary(diary.id);
        return;
      }
      diary.bubbles = diary.bubbles.filter(b => b.id !== bubbleId);
      diary.updatedAt = new Date().toISOString();
      saveDiaries();
      renderSidebar();
      renderMain();
      showToast('气泡已删除');
    }

    function editBubble(diary, bubbleId) {
      const bubble = diary.bubbles.find(b => b.id === bubbleId);
      if (!bubble) return;

      const wrapper = document.querySelector(`.bubble-wrapper[data-bubble-id="${CSS.escape(bubbleId)}"]`);
      if (!wrapper) return;

      const origHtml = wrapper.innerHTML;

      wrapper.innerHTML = `
        <div class="bubble">
          <textarea id="bubbleEditor" style="width:100%;font-size:15px;line-height:1.75;font-family:var(--font);color:var(--black);border:1px solid var(--border);border-radius:var(--radius);padding:14px;resize:vertical;outline:none;min-height:100px;background:var(--white);">${escapeHtml(bubble.content)}</textarea>
          <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;">
            <button class="btn-cancel" id="bubbleCancel">取消</button>
            <button class="btn-save" id="bubbleSave">保存</button>
          </div>
        </div>
      `;

      document.getElementById('bubbleCancel').addEventListener('click', () => {
        wrapper.innerHTML = origHtml;
        rebindBubbleActions(diary);
      });

      document.getElementById('bubbleSave').addEventListener('click', () => {
        const val = document.getElementById('bubbleEditor').value.trim();
        if (val) {
          bubble.content = val;
          diary.updatedAt = new Date().toISOString();
          saveDiaries();
          renderSidebar();
          renderMain();
          showToast('气泡已保存');
        } else {
          wrapper.innerHTML = origHtml;
          rebindBubbleActions(diary);
        }
      });

      document.getElementById('bubbleEditor').focus();
    }

    function rebindBubbleActions(diary) {
      document.querySelectorAll('.bubble-action.copy').forEach(btn => {
        btn.addEventListener('click', () => copyBubble(diary, btn.dataset.bubble, btn));
      });
      document.querySelectorAll('.bubble-action.delete').forEach(btn => {
        btn.addEventListener('click', () => deleteBubble(diary, btn.dataset.bubble));
      });
      document.querySelectorAll('.bubble-action.edit').forEach(btn => {
        btn.addEventListener('click', () => editBubble(diary, btn.dataset.bubble));
      });
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function updateSendButton() {
      if ($diaryInput.value.trim().length > 0) {
        $btnSend.classList.add('has-content');
      } else {
        $btnSend.classList.remove('has-content');
      }
    }

    // ===== TOAST =====
    let toastTimer = null;
    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => $toast.classList.remove('show'), 2000);
    }

    // ===== CRUD =====
    function createDiary() {
      const now = new Date().toISOString();
      const diary = {
        id: generateId(),
        bubbles: [],
        pinned: false,
        createdAt: now,
        updatedAt: now,
      };
      diaries.unshift(diary);
      saveDiaries();
      currentId = diary.id;
      isEditMode = false;
      renderSidebar();
      renderMain();
      closeSidebar();
      $diaryInput.focus();
    }

    function selectDiary(id) {
      if (currentId === id && !isEditMode) return;
      currentId = id;
      isEditMode = false;
      renderSidebar();
      renderMain();
      closeSidebar();
      $diaryInput.focus();
    }

    function deleteDiary(id) {
      const diary = getDiary(id);
      if (!diary) return;
      const label = getDisplayDate(diary.createdAt);
      if (!confirm(`确定删除「${label}」这篇日记吗？此操作不可恢复。`)) return;

      diaries = diaries.filter(d => d.id !== id);
      saveDiaries();
      if (currentId === id) {
        currentId = diaries.length > 0 ? diaries[0].id : null;
        isEditMode = false;
      }
      renderSidebar();
      renderMain();
      showToast('日记已删除');
    }

    // ===== SEND BUBBLE =====
    async function callAI(prompt) {
      return null;
    }

    function buildBubbleContent(text) {
      let content = text;
      if (attachedImages.length > 0) {
        const imgs = attachedImages.map(img => `![](${img.dataUrl})`).join('\n');
        content = content ? content + '\n\n' + imgs : imgs;
      }
      return content;
    }

    function clearAttachments() {
      attachedImages = [];
      $attachPreview.innerHTML = '';
    }

    async function handleSend() {
      const hasText = $diaryInput.value.trim().length > 0;
      const hasImages = attachedImages.length > 0;
      if (!hasText && !hasImages) return;

      const content = buildBubbleContent($diaryInput.value.trim());

      if (!currentId) {
        createDiary();
        const diary = getDiary(currentId);
        if (!diary) return;
        diary.bubbles.push({
          id: generateId(),
          content,
          createdAt: new Date().toISOString(),
        });
        diary.updatedAt = new Date().toISOString();
        saveDiaries();
        $diaryInput.value = '';
        autoResize($diaryInput);
        updateSendButton();
        clearAttachments();
        renderSidebar();
        renderMain();
        $mainContent.scrollTo({ top: $mainContent.scrollHeight, behavior: 'smooth' });
        return;
      }

      const diary = getDiary(currentId);
      if (!diary || isEditMode) return;

      diary.bubbles.push({
        id: generateId(),
        content,
        createdAt: new Date().toISOString(),
      });
      diary.updatedAt = new Date().toISOString();
      saveDiaries();

      $diaryInput.value = '';
      autoResize($diaryInput);
      updateSendButton();
      clearAttachments();

      const aiReply = await callAI(content);
      if (aiReply) {
        diary.bubbles.push({
          id: generateId(),
          content: aiReply,
          createdAt: new Date().toISOString(),
        });
        diary.updatedAt = new Date().toISOString();
        saveDiaries();
      }

      renderSidebar();
      renderMain();
      $mainContent.scrollTo({ top: $mainContent.scrollHeight, behavior: 'smooth' });
    }

    // ===== IMPORT / EXPORT =====
    function exportDiaries() {
      if (diaries.length === 0) { showToast('没有日记可导出'); return; }
      const data = JSON.stringify(diaries, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `diary-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast(`已导出 ${diaries.length} 篇日记`);
      closeSettingsModal();
    }

    function importDiaries() {
      closeSettingsModal();
      $fileInput.click();
    }

    function handleFileImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported)) throw new Error('格式错误');
          const valid = imported.filter(d => d.id);
          if (valid.length === 0) throw new Error('没有有效日记');
          valid.forEach(normDiary);
          const existingIds = new Set(diaries.map(d => d.id));
          valid.forEach(d => { if (existingIds.has(d.id)) d.id = generateId(); });
          diaries = [...valid, ...diaries];
          diaries.sort((a, b) => b.createdAt.localeCompare(a.createdAt));
          saveDiaries();
          currentId = diaries[0].id;
          isEditMode = false;
          renderSidebar();
          renderMain();
          showToast(`已导入 ${valid.length} 篇日记`);
        } catch {
          showToast('导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file);
      $fileInput.value = '';
    }

    // ===== SETTINGS MODAL =====
    function openSettingsModal() {
      closeSidebar();
      $settingsModal.classList.add('open');
    }
    function closeSettingsModal() { $settingsModal.classList.remove('open'); }

    // ===== SIDEBAR MOBILE =====
    let sidebarCollapsed = false;

    function toggleCollapse() {
      sidebarCollapsed = !sidebarCollapsed;
      if (sidebarCollapsed) {
        $sidebar.classList.add('collapsed');
      } else {
        $sidebar.classList.remove('collapsed');
      }
    }

    function openSidebar() {
      $sidebar.classList.add('open');
      $overlay.classList.add('open');
    }

    function closeSidebar() {
      $sidebar.classList.remove('open');
      $overlay.classList.remove('open');
    }

    // ===== EVENT BINDINGS =====
    $btnNew.addEventListener('click', createDiary);

    function togglePin(id) {
      const diary = getDiary(id);
      if (!diary) return;
      diary.pinned = !diary.pinned;
      diary.updatedAt = new Date().toISOString();
      saveDiaries();
      renderSidebar();
    }

    $diaryList.addEventListener('click', (e) => {
      const delBtn = e.target.closest('.diary-item-delete');
      if (delBtn) {
        e.stopPropagation();
        deleteDiary(delBtn.dataset.delete);
        return;
      }
      const pinBtn = e.target.closest('.diary-item-pin');
      if (pinBtn) {
        e.stopPropagation();
        togglePin(pinBtn.dataset.pin);
        return;
      }
      const item = e.target.closest('.diary-item');
      if (item) selectDiary(item.dataset.id);
    });

    $diaryInput.addEventListener('input', () => {
      autoResize($diaryInput);
      updateSendButton();
    });

    $diaryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        handleSend();
      }
    });

    $btnSend.addEventListener('click', handleSend);
    $searchInput.addEventListener('input', () => renderSidebar());

    $hamburger.addEventListener('click', () => {
      $sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });

    $btnCollapse.addEventListener('click', toggleCollapse);

    $overlay.addEventListener('click', closeSidebar);

    $btnSettings.addEventListener('click', openSettingsModal);
    $modalClose.addEventListener('click', closeSettingsModal);
    $settingsModal.addEventListener('click', (e) => {
      if (e.target === $settingsModal) closeSettingsModal();
    });
    $modalImport.addEventListener('click', importDiaries);
    $modalExport.addEventListener('click', exportDiaries);
    $fileInput.addEventListener('change', handleFileImport);

    // ===== IMAGE ATTACHMENT =====
    $btnAttach.addEventListener('click', () => $imageInput.click());

    $imageInput.addEventListener('change', () => {
      const files = Array.from($imageInput.files);
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const dataUrl = ev.target.result;
          attachedImages.push({ name: file.name, dataUrl });
          $attachPreview.innerHTML += `
            <div class="attach-thumb" data-name="${file.name}">
              <img src="${dataUrl}" alt="${file.name}">
              <button class="attach-thumb-remove" data-name="${file.name}">×</button>
            </div>`;
          rebindThumbnails();
        };
        reader.readAsDataURL(file);
      });
      $imageInput.value = '';
      updateSendButtonImg();
    });

    function rebindThumbnails() {
      $attachPreview.querySelectorAll('.attach-thumb-remove').forEach(btn => {
        btn.onclick = () => {
          const name = btn.dataset.name;
          attachedImages = attachedImages.filter(img => img.name !== name);
          const thumb = $attachPreview.querySelector(`.attach-thumb[data-name="${CSS.escape(name)}"]`);
          if (thumb) thumb.remove();
          updateSendButtonImg();
        };
      });
    }

    function updateSendButtonImg() {
      if ($diaryInput.value.trim().length > 0 || attachedImages.length > 0) {
        $btnSend.classList.add('has-content');
      } else {
        $btnSend.classList.remove('has-content');
      }
    }

    const origUpdateSendBtn = updateSendButton;
    updateSendButton = function() {
      origUpdateSendBtn();
      updateSendButtonImg();
    };

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSettingsModal();
    });

    // ===== PWA =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // ===== INIT =====
    function init() {
      try {
        loadDiaries();
        if (diaries.length > 0) currentId = diaries[0].id;
        renderSidebar();
        renderMain();
        if (currentId) $diaryInput.focus();
      } catch(e) { console.error(e); }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
